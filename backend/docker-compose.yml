services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chatsphere-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatsphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatsphere_secret}
      POSTGRES_DB: ${POSTGRES_DB:-chatsphere}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatsphere}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER:-chatsphere}:${POSTGRES_PASSWORD:-chatsphere_secret}@postgres:5432/${POSTGRES_DB:-chatsphere}?schema=public
    container_name: chatsphere-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatsphere}:${POSTGRES_PASSWORD:-chatsphere_secret}@postgres:5432/${POSTGRES_DB:-chatsphere}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-super-secret-access-key-change-in-production-32ch}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production-32ch}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ENABLE_MOCK_AI: ${ENABLE_MOCK_AI:-true}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatsphere-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # Database migrations (run once)
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER:-chatsphere}:${POSTGRES_PASSWORD:-chatsphere_secret}@postgres:5432/${POSTGRES_DB:-chatsphere}?schema=public
    container_name: chatsphere-migrations
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatsphere}:${POSTGRES_PASSWORD:-chatsphere_secret}@postgres:5432/${POSTGRES_DB:-chatsphere}?schema=public
    command: npx prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  uploads_data:
